name: Build Android APK & Release

on:
  push:
    branches: [ "main", "master" ]
    tags:
      - 'v*'
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build-apk:
    name: Build Signed Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Frontend Dependencies & Build Web Bundle
        run: |
          npm ci || npm install
          npm run build
          mkdir -p app/src/main/assets
          mkdir -p android/app/src/main/assets
          cp -r dist/* app/src/main/assets/
          cp -r dist/* android/app/src/main/assets/

      - name: Ensure Gradle Wrapper Executable
        run: |
          chmod +x gradlew || true
          chmod +x android/gradlew || true

      - name: Setup Gradle Wrapper Jar
        run: |
          gradle wrapper --gradle-version 8.2

      - name: Build Debug APK with Gradle
        run: |
          ./gradlew assembleDebug --stacktrace

      - name: Upload Debug APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: VocalizeAI-Android-Debug-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/') || github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v1
        with:
          files: app/build/outputs/apk/debug/app-debug.apk
          name: "Vocalize AI Android Release v1.0.0"
          tag_name: ${{ github.ref_name || 'v1.0.0' }}
          body: |
            ## Vocalize AI - Native Android APK
            
            This is an automatically compiled native Android APK generated by GitHub Actions.
            
            ### Features Included:
            - **20+ American Regional Accent Voices** (New York, Southern, California, Midwest, Boston, Texan, Hawaiian, etc.)
            - **Custom Voice Controls**: Adjustable Speed (0.5x - 2.0x), Pitch, Volume, and MP3/WAV export options
            - **Gemini AI English Spell & Grammar Checker**
            - **Local Audio Storage & History Management**
            - **Android 10 - 16 System Compatibility** with Hardware Acceleration
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
