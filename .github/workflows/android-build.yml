name: Build Android APK & Release

on:
  push:
    branches: [ "main", "master" ]
    tags:
      - 'v*'
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-apk:
    name: Build Signed Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Frontend Dependencies & Build Web Bundle
        run: |
          if [ -f package-lock.json ]; then
            npm ci || npm install
          else
            npm install
          fi
          npm run build
          mkdir -p app/src/main/assets
          mkdir -p android/app/src/main/assets
          cp -r dist/* app/src/main/assets/
          cp -r dist/* android/app/src/main/assets/

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Generate Gradle Wrapper & Build APK
        run: |
          gradle wrapper --gradle-version 8.2
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace

      - name: Upload Debug APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: VocalizeAI-Android-Debug-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Create GitHub Release
        if: (startsWith(github.ref, 'refs/tags/') || github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') && github.event_name != 'pull_request'
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/debug/app-debug.apk
          name: "Vocalize AI Android Release v1.0.0"
          tag_name: "v1.0.0"
          body: |
            ## Vocalize AI - Native Android APK (Android 10 - 16)
            
            This is an automatically compiled native Android APK generated by GitHub Actions.
            
            ### Included Features:
            - **20+ American Regional Accent Voices** (New York, Southern, California, Midwest, Boston, Texan, Hawaiian, etc.)
            - **Custom Speed & Pitch Controls**: Adjustable speed (0.5x - 2.0x), pitch, volume, and MP3/WAV audio export
            - **Gemini AI English Spell & Grammar Checker**
            - **Local Audio Storage & History Management**
            - **Android 10 to 16 Hardware Acceleration & WebView Support**
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
